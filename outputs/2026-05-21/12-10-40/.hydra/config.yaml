  hidden_dim: 64
  mlp_layers: 2
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  conv_filters: 2
  merge_mode: concat
training:
  batch_size: 32
  epochs: 100
  eval_interval: 1
  predict_last: false
  run_name_sufix: ''
optimizer:
  learning_rate: 0.001
  weight_decay: 0.0001
logging:
  wandb_project: pgim-gnn-regressor-exp
  entity: ccliasub-national-university-of-singapore
evaluation:
  tracked_indices:
  - 0
  - 6
  - 11
paths:
  checkpoint_dir: checkpoints
seed: 42
deterministic: true
device: auto
