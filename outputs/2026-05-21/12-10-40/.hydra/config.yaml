      enable: true
      threshold: 250
    same_mrt:
      name: same_mrt
      enable: true
      threshold: 250
    same_mrt_dist:
      name: same_mrt_dist
      epsilon: 5
      enable: true
    same_school_dist:
      name: same_school_dist
      epsilon: 0.01
      enable: true
    same_age:
      name: same_age
      enable: true
    same_planning_area:
      name: same_planning_area
      enable: true
    size_project:
      name: size_project
      enable: true
