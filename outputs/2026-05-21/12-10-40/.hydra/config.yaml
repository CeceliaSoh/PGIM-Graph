    - node_id
    - project_id
    - timestep
    last_few:
    - rent_per_sqft_imp
    - rent_per_sqft
    - y_mask
    sort_by:
    - node_id
    - project_id
    - timestep
  project_node:
    cols: []
    other_feat: true
    max_clip_glo:
